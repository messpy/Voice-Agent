# voicechat 設定

paths:
  workdir: /home/kennypi/work/voicechat/.runtime

runtime:
  run_mode: always_on
  assistant_mode: zundamon
  recognition_mode: balanced
  ai_correction: false
  transcription_backend: speech_recognition
  command_execution: true
  announce_startup: true

recognition_profiles:
  balanced:
    label: "標準"
    description: "speech_recognition で精度を優先し、wake も speech_recognition に任せるのだ。"
    backend: speech_recognition
    ai_correction: false
    realtime_model: /home/kennypi/work/voicechat/.runtime/models/ggml-small.bin
    final_model: /home/kennypi/work/voicechat/.runtime/models/ggml-small.bin
    wake_model: /home/kennypi/work/voicechat/.runtime/models/ggml-small.bin
    wake_threads: 4
  light_chat:
    label: "軽量チャット"
    description: "軽い認識のあとで LLM 補正を入れて会話向けに速くするのだ。"
    backend: local
    ai_correction: true
    realtime_model: /home/kennypi/work/voicechat/.runtime/models/ggml-tiny.bin
    final_model: /home/kennypi/work/voicechat/.runtime/models/ggml-base.bin
    wake_model: /home/kennypi/work/voicechat/.runtime/models/ggml-base.bin
    wake_threads: 4
  precise:
    label: "高精度"
    description: "少し重いけれど認識精度を優先するのだ。"
    backend: local
    ai_correction: true
    realtime_model: /home/kennypi/work/voicechat/.runtime/models/ggml-small.bin
    final_model: /home/kennypi/work/voicechat/.runtime/models/ggml-medium.bin
    wake_model: /home/kennypi/work/voicechat/.runtime/models/ggml-medium.bin
    wake_threads: 4

services:
  voicevox:
    enabled: true
    # voicevox は kennybot-voicevox.service で管理する
    auto_start: false
    health_url: http://127.0.0.1:50021/version
    start_command:
      - /path/to/voicevox_engine/run
    cwd: /path/to/voicevox_engine
    startup_wait_sec: 20
  ollama:
    enabled: true
    auto_start: true
    start_command:
      - ollama
      - serve
    startup_wait_sec: 15

storage:
  jsonl:
    enabled: true
    path: events.jsonl
  sqlite:
    enabled: true
    path: voicechat.db

timed_record:
  seconds: 300
  announce_start: "スタート"
  announce_end_template: "{minutes}分終了"
  background: false
  save_wav: true

remote:
  host: remote-host.example.local
  user: your-user
  port: 22
  ssh_key: ~/.ssh/id_ed25519
  remote_workdir: /home/your-user/voicechat_remote
  remote_python: /home/your-user/voicechat_remote/.venv/bin/python
  remote_script: /home/your-user/voicechat_remote/remote_faster_whisper_transcribe.py
  whisper_model: large-v3
  device: cpu
  compute_type: int8
  skip_correction: false

audio:
  input: plughw:CARD=Device,DEV=0
  output: plughw:CARD=B01,DEV=0
  sample_rate: 16000
  channels: 1
  format: S16_LE

audio_pipeline:
  rnnoise:
    enabled: false
    command:
      - /path/to/rnnoise_wrapper
      - "{input}"
      - "{output}"
  whisper_preprocess:
    enabled: true
    sample_rate: 16000
    channels: 1
    codec: pcm_s16le
    preset_name: compand_denoise
    af: "afftdn=nr=14:nf=-30,highpass=f=120,lowpass=f=3800,compand=attacks=0.02:decays=0.2:points=-80/-80|-24/-10|0/-2"

wake:
  word: "スタックチャン"
  backend: speech_recognition
  pre_vad_backend: webrtc
  pre_vad_hard_gate: false
  startup_arm_delay_sec: 0.3
  words:
    - スタックチャン
    - アレクサ
  aliases:
    スタックチャン:
      - スタックちゃん
      - すたっくちゃん
      - すたっくちやん
      - スタックチャンさん
      - アタックちゃん
      - アタックチャン
      - StackChan
      - stack chan
      - stack-chan
      - stackchan
      - すたっくちゃんさん
      - スタちゃん
      - すたちゃん
      - たくちゃん
      - たっくちゃん
    アレクサ:
      - alexa
      - alex
      - あれくさ
      - .*あ?れ?く?さ.*
      - アレクサ
      - アレクサー
      - あるくさ
  blocklist:
    - 音楽
    - おんがく
    - オンガク
    - 音学
  window_sec: 2.0
  match_threshold: 0.7
  whisper_model: /home/kennypi/work/voicechat/.runtime/models/ggml-medium.bin
  threads: 4
  porcupine:
    access_key_env: PORCUPINE_ACCESS_KEY
    model_path: ""
    sensitivity: 0.7
    sensitivities: {}
    keyword_paths:
      # スタックチャン用 .ppn がある場合はここに追加する
      ずんだもん: ./assets/porcupine/zundamon_ja_raspberry-pi.ppn
      アレクサ: ./assets/porcupine/alexa_raspberry-pi.ppn

vad:
  enabled: true
  aggressiveness: 0
  silence_ms: 1600
  max_record_sec: 15
  chunk_sec: 0.5
  speech_ratio: 0.12
  silero:
    threshold: 0.4
    min_speech_duration_ms: 80
    min_silence_duration_ms: 150

whisper:
  # 既定は速度寄りの small。精度優先なら ggml-medium.bin 以上を指定
  bin: ./whisper.cpp/build/bin/whisper-cli
  realtime_model: ./whisper.cpp/models/ggml-small.bin
  model: ./whisper.cpp/models/ggml-small.bin
  lang: ja
  beam: 6
  best: 6
  temp: 0.0
  threads: 4

vosk:
  model: ./vosk-model-small-ja
  # 軽量 (48MB) - デフォルト
  # realtime_model: ./vosk-model-small-ja
  # 高精度 (1GB)
  # realtime_model: ./vosk-model-ja-0.22

google_stt:
  # Google Speech-to-Text を使う場合は下記を調整
  language_code: ja-JP
  encoding: LINEAR16
  sample_rate_hertz: 16000
  model: latest_short
  use_enhanced: true
  enable_automatic_punctuation: true
  audio_channel_count: 1
  speech_contexts:
    - phrases:
        - スタックチャン
        - ずんだもん

speech_recognition:
  # speech_recognition で Google Web Speech を使うときの設定
  engine: google
  language: ja-JP
  show_all: false
  timeout_sec: 2.5

cohere_transcribe:
  enabled: false
  api_url: https://api.cohere.ai/v1/audio/transcriptions
  model: ""
  language: ja
  prompt: ""
  timeout_sec: 300
  output_dir: /tmp/voicechat/cohere_transcribe
  ffmpeg:
    sample_rate: 16000
    channels: 1
    codec: pcm_s16le
    format: wav
  arecord:
    device: plughw:CARD=Device,DEV=0
    sample_rate: 16000
    channels: 1
    format: S16_LE

llm:
  provider: ollama
  model: gpt-oss:120b-cloud
  timeout_sec: 300
  host: http://127.0.0.1:11434
  api_key_env: OLLAMA_API_KEY
  think: low
  api_base: https://generativelanguage.googleapis.com/v1beta
  anthropic_version: 2023-06-01
  web_search:
    enabled: true
    max_results: 5

ollama:
  host: http://127.0.0.1:11434
  model: gpt-oss:120b-cloud
  timeout_sec: 300

assistant:
  active_mode: phrase_test
  history_turns: 6
  memory_search:
    enabled: true
    top_k: 5
    min_score: 0.18
    scan_limit: 2000
    lookback_turns: 3
  summary_memory:
    enabled: true
    update_every_turns: 3
    initial_summary: ""
  rag:
    enabled: true
    top_k: 3
    min_score: 0.12
    chunk_size: 500
    chunk_overlap: 80
    max_files: 24
    max_file_chars: 4000
    paths:
      - README.md
      - config/**/*.yaml
      - logs/**/*.txt
  conversation_log:
    enabled: true
    path: conversation.jsonl
  modes:
    default:
      system_prompt: "あなたは日本語の音声アシスタント。会話量は状況に応じて調整する。単純な確認には短く、説明や相談には必要なだけ具体的に答える。自然な日本語で話す。"
      startup_greeting: "起動しました。準備できたのだ。"
      startup_briefing:
        enabled: true
        topic_source:
          weather_enabled: true
          news_enabled: true
          weather:
            label: "東京"
            latitude: 35.6762
            longitude: 139.6503
            timezone: Asia/Tokyo
          news:
            rss_url: "https://news.yahoo.co.jp/rss/topics/top-picks.xml"
            count: 3
    zundamon:
      system_prompt: "あなたはずんだもん。親しみやすく、少しくだけた自然な日本語で話すのだ。相手の話を受けて、短すぎず長すぎず自然に返すのだ。分からないときは決めつけずに聞き返すのだ。一人称は『ぼく』か『ずんだもん』を使うのだ。語尾は不自然に毎回は付けず、ときどき『のだ』を混ぜるのだ。"
      startup_greeting: "ずんだもんとして起動したのだ。準備できたのだ。"
      startup_briefing:
        enabled: false
    debug_stt:
      system_prompt: "あなたはずんだもん。明るく自然な日本語で短く話すのだ。"
      startup_greeting: "ずんだもんなのだ。話してくれたことを聞いて、直して、そのまま読むのだ。"
      startup_briefing:
        enabled: false
      debug_stt:
        min_chars: 4
        echo_cooldown_sec: 4.0
        echo_similarity: 0.72
    phrase_test:
      system_prompt: "あなたはずんだもん。明るく自然な日本語で短く話すのだ。"
      startup_greeting: "発話テストを始めるのだ。ぼくが言う文を、そのまま言ってほしいのだ。"
      startup_briefing:
        enabled: false
      debug_stt:
        min_chars: 4
        echo_cooldown_sec: 4.0
        echo_similarity: 0.72
      prompt_template: "ずんだもんなのだ。3、2、1。{phrase}、と言ってくださいなのだ。"
      repeat_prompt: "聞き取りが弱かったのだ。もう一度同じ文をお願いするのだ。"
      phrases_file: config/phrase_test_words.json
      style_cycle:
        - speaker: 3
          name: "ノーマル"
        - speaker: 1
          name: "あまあま"
        - speaker: 7
          name: "ツンツン"
        - speaker: 5
          name: "セクシー"
        - speaker: 22
          name: "ささやき"
        - speaker: 38
          name: "ヒソヒソ"
        - speaker: 75
          name: "ヘロヘロ"
        - speaker: 76
          name: "なみだめ"
    teacher:
      system_prompt: "あなたは日本語のAI導師。相手の理解度に合わせて、問い返しを交えながら丁寧に導く。いきなり答えを押しつけず、要点、理由、次の一歩をわかりやすく示す。必要なら短く、必要なら具体例も使う。"
      startup_greeting: "導師モードで起動しました。学びたいことを話してください。"
    ai_duo:
      ollama_model: gpt-oss:120b-cloud
      startup_greeting: "AI同士のおしゃべりモードを始めるのだ。"
      duo:
        opening: "今日のニュースと天気をもとに、二人で話してみるのだ。"
        max_turns: 0
        pause_sec: 0.12
        ollama_options:
          num_predict: 48
          temperature: 0.8
        topic_source:
          weather_enabled: true
          news_enabled: true
          weather:
            label: "東京"
            latitude: 35.6762
            longitude: 139.6503
            timezone: Asia/Tokyo
          news:
            rss_url: "https://news.yahoo.co.jp/rss/topics/top-picks.xml"
            count: 3
        participants:
          - name: "ずんだもん"
            speaker: 3
            system_prompt: "あなたはずんだもん。親しみやすく、少しくだけた自然な日本語で話す。一人称は『ぼく』でも『ずんだもん』でもよい。短くテンポよく、一文で返す。"
            style_prompt: "明るく親しみやすく、短く軽快に。"
          - name: "四国めたん"
            speaker: 2
            system_prompt: "あなたは四国めたん。落ち着いて少し大人っぽい日本語で話す。相手の話を受けて、短く自然に返す。一文で返す。"
            style_prompt: "上品だけど短くテンポよく。"

ai_control:
  aliases:
    - alias: ollama_kimi
      provider: ollama
      model: gpt-oss:120b-cloud
    - alias: gemini_flash
      provider: gemini
      model: gemini-2.5-flash
    - alias: openai_gpt5mini
      provider: openai
      model: gpt-5-mini
    - alias: anthropic_claude
      provider: anthropic
      model: claude-sonnet-4-20250514

tts:
  enabled: true
  backend: voicevox
  engine_host: http://127.0.0.1:50021
  speaker: 3
  voicevox_speed_scale: 1.0
  voicevox_pitch_scale: 0.03
  voicevox_intonation_scale: 1.15
  voicevox_volume_scale: 1.0

effects:
  ready:
    enabled: true
    file: assets/effects/ready_pipo.wav
    frequency_hz: 523.3
    duration_ms: 140
    volume: 0.48
    gap_ms: 25
    sequence:
      - frequency_hz: 523.3
        duration_ms: 130
        volume: 0.44
        gap_ms: 20
      - frequency_hz: 659.3
        duration_ms: 170
        volume: 0.5
  recorded:
    enabled: true
    file: assets/effects/recorded_popi.wav
    frequency_hz: 587.3
    duration_ms: 130
    volume: 0.44
    gap_ms: 20
    sequence:
      - frequency_hz: 587.3
        duration_ms: 120
        volume: 0.42
        gap_ms: 20
      - frequency_hz: 440.0
        duration_ms: 180
        volume: 0.48
  commands:
    volume_up:
      enabled: true
      file: assets/effects/recorded_popi.wav
      sequence:
        - frequency_hz: 523.3
          duration_ms: 90
          volume: 0.42
          gap_ms: 20
        - frequency_hz: 784.0
          duration_ms: 120
          volume: 0.5
    volume_down:
      enabled: true
      file: assets/effects/volume_down_popi.wav
      sequence:
        - frequency_hz: 784.0
          duration_ms: 90
          volume: 0.42
          gap_ms: 20
        - frequency_hz: 523.3
          duration_ms: 120
          volume: 0.5
    volume_change:
      enabled: true
      file: assets/effects/ready_pipo.wav

command_router:
  enabled: true
  fallback_reply: "その操作はまだ登録していないのだ。"
  ready_prompt: "はい、どうぞ。"
  unknown_command_reply: ""
  talk_mode:
    record_sec: 8.0
    pre_record_delay_sec: 1.5
    ollama_model: gemma3:4b
    use_corrected_transcript: false
    ollama_options:
      num_predict: 64
      temperature: 0.7
  help:
    intro: "使える操作は次のとおりなのだ。"
    separator: "、"
    outro: "スタックチャンのあとに続けて言ってほしいのだ。"
  short_input_reset_chars: 1
  short_input_reset_reply: ""
  no_speech_timeout_sec: 2.0
  no_speech_reset_reply: ""
  silero_gate:
    enabled: true
  candidate_confirmation:
    enabled: true
    min_score: 0.45
    top_k: 2
    reply_single: "もしかして {primary} なのだ？ はい か いいえ、または言い直してほしいのだ。"
    reply_with_alternatives: "もしかして {primary} なのだ？ 候補には {alternatives} もあるのだ。{primary} でよければ はい、違うなら言い直してほしいのだ。"
    yes_phrases:
      - はい
      - うん
      - お願い
      - それ
    no_phrases:
      - いいえ
      - 違う
      - ちがう
      - 違います
    reset_phrases:
      - 何でもない
      - なんでもない
      - キャンセル
      - なし
      - やめる
  action_runners:
    external_cli:
      command:
        - .venv/bin/python
        - -m
        - voicechat_actions.bridge
      cwd: ../voicechat-actions
      env:
        PULSE_SERVER: unix:/run/user/1000/pulse/native
        XDG_RUNTIME_DIR: /run/user/1000
  dynamic_patterns:
    - id: volume_set_percent
      pattern: "音量を(?P<value>\\d{1,3})%にして"
      reply: "音量を{volume_percent}%にするのだ。"
      action_type: external_cli
      action_name: audio.volume_set
      captures:
        value:
          target: volume_percent
          type: direct_percent
          min: 0
          max: 100
      args: {}
    - id: volume_set_level
      pattern: "音量を(?P<value>\\d{1,2})にして"
      reply: "音量を{volume_percent}%にするのだ。"
      action_type: external_cli
      action_name: audio.volume_set
      captures:
        value:
          target: volume_percent
          type: times_ten
          min: 0
          max: 100
      args: {}
    - id: timer_set_minutes
      pattern: "(?P<minutes>\\d{1,3})分タイマー"
      reply: "{minutes}分タイマーをセットするのだ。"
      action_type: external_cli
      action_name: timer.set
      captures:
        minutes:
          target: minutes
          type: int
          min: 1
          max: 1440
      args: {}
    - id: alarm_set_hm
      pattern: "(?<!明日)(?P<hour>\\d{1,2})時(?:(?P<minute>\\d{1,2})分)?(?:に)?(?:起こして|アラーム(?:を)?セットして)"
      reply: "{hour}時{minute}分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
        minute:
          target: minute
          type: int
          min: 0
          max: 59
          default: 0
      args: {}
    - id: alarm_set_plain
      pattern: "(?<!明日)(?P<hour>\\d{1,2})時(?:(?P<minute>\\d{1,2})分)?にアラーム"
      reply: "{hour}時{minute}分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
        minute:
          target: minute
          type: int
          min: 0
          max: 59
          default: 0
      args: {}
    - id: alarm_set_half
      pattern: "(?<!明日)(?P<hour>\\d{1,2})時半(?:に)?(?:起こして|アラーム(?:を)?セットして)"
      reply: "{hour}時30分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
      args:
        minute: 30
    - id: alarm_set_tomorrow_half
      pattern: "明日(?P<hour>\\d{1,2})時半(?:に)?(?:起こして|アラーム(?:を)?セットして|アラーム)"
      reply: "明日{hour}時30分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
      args:
        minute: 30
    - id: alarm_set_tomorrow_hm
      pattern: "明日(?P<hour>\\d{1,2})時(?:(?P<minute>\\d{1,2})分)?(?:に)?(?:起こして|アラーム(?:を)?セットして)"
      reply: "明日{hour}時{minute}分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
        minute:
          target: minute
          type: int
          min: 0
          max: 59
          default: 0
      args: {}
    - id: alarm_set_tomorrow_plain
      pattern: "明日(?P<hour>\\d{1,2})時(?:(?P<minute>\\d{1,2})分)?にアラーム"
      reply: "明日{hour}時{minute}分にアラームをセットしました。"
      action_type: external_cli
      action_name: alarm.set
      captures:
        hour:
          target: hour
          type: int
          min: 0
          max: 23
        minute:
          target: minute
          type: int
          min: 0
          max: 59
          default: 0
      args: {}
    - id: video_play_search
      pattern: "(?P<query>.+?)の動画を再生して"
      reply: "{query}の動画を再生するのだ。"
      action_type: external_cli
      action_name: music.play
      captures:
        query:
          target: search_query
          type: str
      args:
        playlist_url: ""
    - id: video_play_youtube
      pattern: "YouTubeで(?P<query>.+?)を再生して"
      reply: "{query}をYouTubeで再生するのだ。"
      action_type: external_cli
      action_name: music.play
      captures:
        query:
          target: search_query
          type: str
      args:
        playlist_url: ""
    - id: video_play_generic
      pattern: "(?P<query>.+?)を再生して"
      reply: "{query}を再生するのだ。"
      action_type: external_cli
      action_name: music.play
      captures:
        query:
          target: search_query
          type: str
      args:
        playlist_url: ""
  normalization:
    enabled: true
    top_k: 5
    min_score: 0.32
    auto_apply_score: 0.72
    llm_enabled: true
  commands:
    - id: volume_up
      help_label: "音量あげて"
      phrases:
        - 音量あげて
        - 音量上げて
      reply: "音量を上げるのだ。"
      success_effect: volume_change
      action_type: external_cli
      action_name: audio.volume_up
      args:
        delta: "10%+"
    - id: volume_down
      help_label: "音量下げて"
      phrases:
        - 音量さげて
        - 音量下げて
      reply: "音量を下げるのだ。"
      success_effect: volume_change
      action_type: external_cli
      action_name: audio.volume_down
      args:
        delta: "10%-"
    - id: volume_query
      help_label: "音量いくつ"
      phrases:
        - 音量いくつ
        - 今の音量
        - 音量どれくらい
        - 音量何パーセント
      reply: ""
      action_type: external_cli
      action_name: audio.volume_get
      args: {}
    - id: music_stop
      help_label: "音楽とめて"
      phrases:
